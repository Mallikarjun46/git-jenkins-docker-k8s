apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeline-app
  template:
    metadata:
      labels:
        app: pipeline-app
    spec:
      containers:
      - name: pipeline-app
        image: mallikarjun46/pipeline-app:latest
        ports:
        - containerPort: 5000

